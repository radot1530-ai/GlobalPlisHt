<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css"> 
  <title>Detay Pwodui - Global Plis</title>
  <style>
    /* Ti style siplemantè pou paj detay la */
    .product-detail-container {
      display: flex; flex-wrap: wrap; gap: 30px; max-width: 1000px; margin: 40px auto; padding: 20px;
    }
    .product-image-box { flex: 1; min-width: 300px; }
    .product-image-box img { width: 100%; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .product-info-box { flex: 1; min-width: 300px; }
    .product-title { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
    .product-price { font-size: 24px; color: #ff7a3d; margin-bottom: 20px; font-weight: bold; }
    .product-desc { font-size: 16px; color: #555; line-height: 1.6; margin-bottom: 30px; }
    .back-btn { display: inline-block; margin: 20px; text-decoration: none; color: #1e3f8a; font-weight: bold; }
  </style>
</head>
<body>

  <a href="/index.html" class="back-btn">⬅ Tounen nan Prensipal la</a>

  <div id="loadingMessage" style="text-align:center; font-size:20px; margin-top:50px;">Ap chaje pwodui a...</div>
  
  <div class="product-detail-container" id="productDetail" style="display:none;">
    <div class="product-image-box">
      <img id="detailImg" src="" alt="Imaj pwodui">
    </div>
    <div class="product-info-box">
      <h1 class="product-title" id="detailName">...</h1>
      <div class="product-price" id="detailPrice">... HTG</div>
      <p class="product-desc" id="detailDesc">...</p>
      
      <button id="buyNowBtn" class="btn" style="background:#1e3f8a; color:white; width:100%; padding:15px; font-size:18px;">
        Kòmande sou WhatsApp kounye a
      </button>
    </div>
  </div>

<script type="module" src="pwodui.js"></script>
<script type="module" src="firebase-j.js"></script>
</body>
</html>
