<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detay Kou a | Global Plis +∞</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
  <style>
    /* --- DESIGN GLOBAL PLIS +∞ --- */
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
    .container { max-width: 800px; margin: 40px auto; padding: 20px; }
    
    /* Loading Spinner */
    #loadingSpinner { text-align: center; padding: 60px 20px; color: #1e3f8a; background: #fff; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    
    /* Kat Detay Kou a */
    .course-detail-card { background: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid #f0f0f0; display: none; }
    .course-detail-card img.banner { width: 100%; height: 350px; object-fit: cover; display: block; }
    
    .course-content { padding: 30px; }
    .course-badge { display: inline-block; background-color: #e0f2fe; color: #0369a1; padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
    .course-title { font-size: 28px; color: #111; margin: 0 0 15px; font-weight: bold; line-height: 1.3; }
    
    .course-meta { display: flex; gap: 20px; font-size: 15px; color: #666; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #eee; flex-wrap: wrap; }
    .course-meta span i { color: #ff9800; margin-right: 6px; }
    
    .course-description-box { background: #f8fafc; padding: 20px; border-radius: 12px; margin-bottom: 25px; border-left: 4px solid #1e3f8a; }
    .course-description-box h3 { margin-top: 0; color: #1e3f8a; font-size: 18px; }
    .course-description-box p { color: #444; line-height: 1.6; margin-bottom: 0; font-size: 15px; }

    /* Aksyon ak Pèman */
    #actionSection { background: #fff; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 20px; text-align: center; }
    
    .btn { padding: 14px 24px; border-radius: 8px; font-size: 16px; font-weight: bold; text-align: center; cursor: pointer; border: none; transition: all 0.3s ease; display: inline-block; width: 100%; box-sizing: border-box; }
    .btn-google { background-color: #db4437; color: white; box-shadow: 0 4px 12px rgba(219, 68, 55, 0.3); }
    .btn-google:hover { transform: translateY(-3px); background-color: #c53929; }
    .btn-pay { background-color: #ff7a3d; color: white; box-shadow: 0 4px 12px rgba(255, 122, 61, 0.3); }
    .btn-pay:hover { transform: translateY(-3px); background-color: #e8682e; }
    .btn-free { background-color: #10b981; color: white; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
    .btn-free:hover { transform: translateY(-3px); background-color: #059669; }

    /* Fòm Pèman ki jere pa JS */
    .payment-input-group { margin: 15px 0; text-align: left; }
    .payment-input-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
    .payment-input-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
    
    .payment-logos { display: flex; justify-content: center; gap: 15px; margin-top: 20px; align-items: center; }
    .payment-logos img { height: 40px; border-radius: 8px; border: 1px solid #eee; padding: 2px; background: #fff; }

    @media (max-width: 600px) {
      .course-detail-card img.banner { height: 200px; }
      .course-title { font-size: 22px; }
    }
  </style>
</head>
<body>
  
  <header class="main-header">
  <div class="header-top-bar">
    <div class="brand-container">
      <img src="image/1768017763381.png" alt="Global Plis Logo" class="main-logo" onerror="this.src='https://via.placeholder.com/150x40?text=Global+Plis'">
    </div>
<button id="loginBtn" class="login-pill" onclick="document.getElementById('authModal').style.display='flex'"><span>🔐</span> Enskri</button>

  </div>

</header>

<div class="container">
  <div id="loadingSpinner">
    <i class="fas fa-circle-notch fa-spin" style="font-size: 40px; margin-bottom: 15px;"></i>
    <p style="font-size: 18px; font-weight: bold;">Ap chaje enfòmasyon kou a...</p>
  </div>

  <div class="course-detail-card" id="courseDetailCard">
    <img id="kouImaj" class="banner" src="" alt="Imaj Kou a">
    
    <div class="course-content">
      <span class="course-badge" id="kouBadge"></span>
      <h1 class="course-title" id="kouTit"></h1>
      
      <div class="course-meta">
        <span><i class="fas fa-clock"></i> <strong id="kouDire"></strong></span>
        <span><i class="fas fa-chart-line"></i> <strong id="kouNivo"></strong></span>
        <span><i class="fas fa-tag"></i> <strong id="kouPri" style="color: #1e3f8a; font-size: 16px;"></strong></span>
      </div>

      <div class="course-description-box">
        <h3>🎯 Objektif Kou a</h3>
        <p id="kouObjektif"></p>
      </div>

      <div class="course-description-box" style="border-left-color: #ff7a3d;">
        <h3>📖 Deskripsyon ak Eksplikasyon</h3>
        <p id="kouDeskripsyon"></p>
      </div>

      <div id="actionSection"></div>
      
    </div>
  </div>
</div>
<script type="module" src="kou.js"></script>
<script type="module" src="/index.js"></script>
<script type="module" src="/firebase-j.js"></script>

<div id="authModal" class="popups" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;">
  <div style="background:#fff; padding:30px; border-radius:12px; width:90%; max-width:400px; text-align:center; position:relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
    <span onclick="document.getElementById('authModal').style.display='none'" style="position:absolute; right:15px; top:10px; cursor:pointer; font-size:24px; font-weight:bold; color:#666;">&times;</span>
    
    <h3 id="authTitle" style="color:#1e3f8a; margin-top:0;">Konekte</h3>
    
    <button id="googleAuthBtn" class="btn btn-google" style="width:100%; margin-bottom:20px; font-size:15px;">
      <i class="fab fa-google"></i> Kontinye ak Google
    </button>
    
    <div style="display:flex; align-items:center; margin-bottom:20px;">
      <div style="flex:1; height:1px; background:#ccc;"></div>
      <span style="padding:0 10px; color:#888; font-size:12px;">OSWA</span>
      <div style="flex:1; height:1px; background:#ccc;"></div>
    </div>
    
    <input type="text" id="authName" placeholder="Non konplè w" style="display:none; width:100%; padding:12px; margin-bottom:12px; border:1px solid #cbd5e1; border-radius:8px; box-sizing:border-box;">
    
    <input type="email" id="authEmail" placeholder="Imel ou" style="width:100%; padding:12px; margin-bottom:12px; border:1px solid #cbd5e1; border-radius:8px; box-sizing:border-box;">
    
    <input type="password" id="authPassword" placeholder="Modpas (6 karaktè min.)" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #cbd5e1; border-radius:8px; box-sizing:border-box;">
    
    <button id="manualAuthBtn" class="btn" style="background:#1e3f8a; color:white; width:100%; border:none;">Konekte</button>
    
    <p style="margin-top:20px; font-size:14px; color:#555;">
      <span id="authToggleText">Ou poko gen kont?</span> 
      <a href="#" id="toggleAuthMode" style="color:#ff7a3d; font-weight:bold; text-decoration:none;">Kreye youn kounye a</a>
    </p>

  </div>
</div>
<div id="toast" style="position:fixed; bottom:20px; right:20px; background:#333; color:#fff; padding:15px 25px; border-radius:5px; display:none; z-index:9999; text-align: center;"></div>
</body>
</html>
