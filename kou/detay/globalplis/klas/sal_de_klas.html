<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Plis +∞ | Platfòm Fòmasyon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #0f172a, #1e40af, #3b82f6); }
        .locked { opacity: 0.7; pointer-events: none; filter: grayscale(80%); position: relative; }
        .locked::after { 
            content: "🔒 MODIL SA FÈMEN"; 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(15, 23, 42, 0.85); color: #fbbf24; padding: 10px 20px; 
            border-radius: 8px; font-weight: 800; z-index: 10; font-size: 0.9rem; letter-spacing: 1px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .rotate-90 { transform: rotate(90deg); width: 100vh !important; height: 100vw !important; object-fit: contain; }
        video::-webkit-media-controls-download-button { display:none; }
        video::-webkit-media-controls-enclosure { overflow:hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #1e40af; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans selection:bg-blue-200">

    <!-- SEKIRITE: Ekran sa ap bloke paj la jiskaske Auth la verifye -->
    <div id="authOverlay" class="fixed inset-0 bg-slate-900 z-[100] flex flex-col items-center justify-center text-white backdrop-blur-md transition-opacity">
        <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-black text-2xl tracking-wide">Ap Verifye Aksè w...</p>
        <p class="text-blue-300 text-sm mt-2">Global Plis +∞ Sekirite</p>
    </div>

    <header class="gradient-bg text-white p-6 text-center shadow-lg border-b-4 border-blue-400">
        <h1 class="text-4xl font-black tracking-tight">GLOBAL PLiS <span class="text-yellow-400">+∞</span></h1>
        <h2 id="courseTitle" class="text-xl font-bold mt-2 text-blue-100">Kou ap chaje...</h2>
    </header>

    <main class="max-w-4xl mx-auto p-4 md:p-6">

        <!-- ESTATISTIK AK SÈTIFIKA -->
        <div class="bg-white p-5 rounded-xl shadow-md mb-8 border border-slate-100">
            <div class="flex justify-between items-end mb-2">
                <h3 class="font-bold text-slate-700 text-lg">Pwogresyon w nan Fòmasyon an</h3>
                <span class="font-black text-2xl text-blue-600"><span id="progressText">0</span>%</span>
            </div>
            <div class="w-full bg-slate-200 rounded-full h-4 mb-4 overflow-hidden shadow-inner">
                <div id="progressBar" class="bg-gradient-to-r from-blue-500 to-green-500 h-4 rounded-full transition-all duration-1000 ease-out" style="width: 0%;"></div>
            </div>
            <div class="flex justify-end">
                <button id="certBtn" disabled class="bg-slate-200 text-slate-400 font-bold px-6 py-3 rounded-xl cursor-not-allowed text-sm flex items-center gap-2 transition-all duration-500">
                    🔒 Sètifika (Poko Disponib)
                </button>
            </div>
        </div>

        <div id="authBar" class="bg-white p-4 rounded-lg shadow-sm border border-slate-200 mb-8 flex flex-col md:flex-row justify-between items-center transition-all gap-4">
            <div id="userInfo" class="flex items-center gap-3">
                <div id="statusIndicator" class="w-3 h-3 rounded-full bg-green-400 animate-pulse"></div>
                <div>
                    <p id="userName" class="font-bold text-lg text-slate-800">Elèv...</p>
                    <p id="userEmail" class="text-slate-500 text-xs font-bold"></p>
                </div>
            </div>
            <div>
                <!-- Bouton dekoneksyon konplè -->
                <button id="logoutBtn" onclick="logout()" class="bg-slate-100 hover:bg-red-50 text-red-600 border border-slate-200 hover:border-red-200 px-4 py-2 rounded-md font-bold transition-colors">Dekonekte nèt</button>
            </div>
        </div>

        <!-- SEKSYON SEKIRITE APARÈY -->
        <div id="deviceLockSection" class="hidden mb-8 bg-orange-50 border-2 border-orange-300 p-6 rounded-xl shadow-sm text-center">
            <i class="fas fa-mobile-alt text-orange-500 text-4xl mb-3"></i>
            <h2 class="text-xl font-bold text-orange-800 mb-2">Lye Aparèy Sa A</h2>
            <p class="text-orange-700 mb-4 text-sm">Pou pwoteje kont ou, ou dwe lye telefòn/navigatè sa a. Antre ID itilizatè w la anba a:</p>
            <div class="flex max-w-md mx-auto gap-2">
                <input type="text" id="inputId" placeholder="Kole ID w la isit la..." class="flex-1 border border-orange-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                <button onclick="linkDevice()" class="bg-orange-600 hover:bg-orange-700 text-white px-6 py-3 rounded-lg font-bold transition">Lye</button>
            </div>
        </div>

        <div id="deviceActiveSection" class="hidden">
            <!-- Pwogram / Syllabus -->
            <div class="mb-8">
                <h3 class="font-black text-slate-400 uppercase tracking-widest text-sm mb-4">Pwogram konplè a</h3>
                <ul id="syllabusList" class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 space-y-3"></ul>
            </div>

            <!-- Modil Dinamik yo ap parèt isit la -->
            <div id="modulesContainer" class="space-y-6"></div>
        </div>
        
    </main>

    <!-- Modal Quiz -->
    <div id="quizModal" class="fixed inset-0 bg-slate-900/90 hidden flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white p-6 rounded-2xl w-full max-w-lg shadow-2xl relative transform transition-all">
            <button onclick="closeQuiz()" class="absolute top-4 right-4 bg-slate-100 hover:bg-red-100 text-slate-400 hover:text-red-500 w-8 h-8 rounded-full flex items-center justify-center font-bold transition-colors">&times;</button>
            <div class="flex items-center gap-3 mb-4 border-b pb-4">
                <div class="bg-blue-100 p-2 rounded-lg"><span class="text-2xl">📝</span></div>
                <h3 class="font-black text-2xl text-slate-800">Egzamen Modil <span id="currentModNum" class="text-blue-600"></span></h3>
            </div>
            <div id="quizContent" class="space-y-4 py-2 max-h-[55vh] overflow-y-auto px-1"></div>
            <div class="mt-6">
                <button onclick="submitQuiz()" class="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-xl font-black text-lg shadow-[0_4px_0_rgb(22,163,74)] active:shadow-[0_0px_0_rgb(22,163,74)] active:translate-y-1 transition-all">Valide Repons yo</button>
            </div>
        </div>
    </div>

    <!-- SCRIPT FIREBASE AK LOJIK -->
<script type="module" src="klas.js"></script>
</body>
</html>
